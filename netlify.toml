[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "18"

# Redirect all requests to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API proxy to prevent CORS issues (optional)
[[redirects]]
  from = "/api/*"
  to = "https://ace-supermarket-backend.onrender.com/api/v1/:splat"
  status = 200
  force = true
